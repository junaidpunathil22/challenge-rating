<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
  
  <title>Frontend Mentor | Interactive rating component</title>

</head>
<body>

  <div class="rating-cart">
    <div class="icon">
      <img class="icon-image" src="images/icon-star.svg" alt="star icon">
    </div>
    <h3>How did we do?</h3>
    <p>Please let us know how we did with your support request. All feedback is appreciated to help us improve our offering.</p>

     <div class="rating-number">
      <button id="btn" onclick="passValue(1)">1</button>
      <button id="btn" onclick="passValue(2)">2</button>
      <button id="btn" onclick="passValue(3)">3</button>
      <button id="btn" onclick="passValue(4)">4</button>
      <button id="btn" onclick="passValue(5)">5</button>
     </div>

     <button id="submit-btn" onclick="submitRating()">submit</button>
  </div>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Junaid</a>.
  </footer>

  
</body>
</html>
